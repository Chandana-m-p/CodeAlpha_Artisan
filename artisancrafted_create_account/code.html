<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | ArtisanCrafted</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",

                    "surface-variant": "#3b3047",
                    "surface-dim": "#190f24",
                    "outline": "#988d98",
                    "background": "#190f24",
                    "on-secondary-fixed": "#330044",
                    "inverse-on-surface": "#372c42",
                    "on-tertiary-fixed-variant": "#4b4359",
                    "surface-container-low": "#21172c",
                    "surface": "#190f24",
                    "tertiary-fixed-dim": "#cdc2dd",
                    "surface-container-lowest": "#13091e",
                    "on-primary-fixed": "#310343",
                    "inverse-surface": "#eedcfa",
                    "on-secondary-fixed-variant": "#77009a",
                    "secondary": "#efb0ff",
                    "primary": "#f8d5ff",
                    "on-tertiary-fixed": "#1e182c",
                    "secondary-fixed-dim": "#efb0ff",
                    "tertiary-fixed": "#e9def9",
                    "tertiary-container": "#cbc0db",
                    "primary-fixed": "#f9d8ff",
                    "outline-variant": "#4d444e",
                    "on-primary-fixed-variant": "#613472",
                    "surface-container-high": "#30253c",
                    "on-primary-container": "#6c3f7d",
                    "on-background": "#eedcfa",
                    "error-container": "#93000a",
                    "on-surface": "#eedcfa",
                    "on-tertiary-container": "#554e64",
                    "on-error-container": "#ffdad6",
                    "surface-container-highest": "#3b3047",
                    "primary-fixed-dim": "#eab3fa",
                    "tertiary": "#e7dcf7",
                    "primary-container": "#e8b1f8",
                    "on-secondary": "#54006e",
                    "surface-tint": "#eab3fa",
                    "on-surface-variant": "#cfc3cf",
                    "on-error": "#690005",
                    "error": "#ffb4ab",
                    "surface-bright": "#40344c",
                    "secondary-container": "#a300d3",
                    "inverse-primary": "#7b4c8b",
                    "on-secondary-container": "#f9d4ff",
                    "secondary-fixed": "#fad7ff",
                    "on-primary": "#481d59",
                    "surface-container": "#251b31",
                    "on-tertiary": "#342d42"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-lg": "3rem",
                    "stack-md": "1.5rem",
                    "margin-desktop": "2.5rem",
                    "gutter": "1.5rem",
                    "stack-sm": "0.5rem",
                    "container-max": "1280px",
                    "margin-mobile": "1rem"
            },
            "fontFamily": {

                    "headline-lg": ["Playfair Display"],

                    "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "500"}]

          },
        },
      }

<style>
        body {
            background-color: #1A1025;
            overflow-x: hidden;
        }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .aura-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(163, 0, 211, 0.15) 0%, rgba(26, 16, 37, 0) 70%);
            filter: blur(60px);
            z-index: -1;
        }
        .aura-1 { top: -10%; left: -10%; }
        .aura-2 { bottom: -10%; right: -10%; }
        
        .form-input {
            background: rgba(19, 9, 30, 0.6) !important;
            border: none !important;
            border-bottom: 1px solid rgba(152, 141, 152, 0.3) !important;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            border-bottom: 1px solid #e8b1f8 !important; /* Orchid Mist / Champagne Gold feel */
            box-shadow: 0 4px 12px -2px rgba(232, 177, 248, 0.2) !important;
            outline: none !important;
        }
        .primary-glow-button {
            box-shadow: 0 0 20px rgba(232, 177, 248, 0.3);
            transition: all 0.3s ease;
        }
        .primary-glow-button:hover {
            box-shadow: 0 0 30px rgba(232, 177, 248, 0.5);
            transform: translateY(-1px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative">
<!-- Atmospheric Background Layers -->
<div class="fixed inset-0 bg-gradient-to-br from-[#1A1025] via-[#251B31] to-[#13091E] z-[-2]"></div>
<div class="aura-glow aura-1 animate-pulse"></div>
<div class="aura-glow aura-2" style="animation: pulse 8s infinite alternate;"></div>
<!-- Main Sign Up Container -->
<main class="w-full max-w-[480px] z-10">
<!-- Logo/Home Anchor -->
<div class="flex justify-center mb-stack-md">
<span class="font-headline-lg text-headline-lg text-primary tracking-tight font-bold">ArtisanCrafted</span>
</div>
<!-- Central Card -->
<div class="liquid-glass rounded-xl p-8 md:p-10 border-t border-l border-white/10">
<header class="text-center mb-stack-md">
<h1 class="font-headline-md text-headline-md text-on-surface mb-stack-sm">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-80">Begin your journey with ArtisanCrafted</p>
</header>
<form action="#" class="space-y-gutter">
<!-- Full Name Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2" for="full_name">
<span class="material-symbols-outlined text-[18px]">person</span>
                        Full Name
                    </label>
<input class="form-input w-full px-0 py-3 font-body-md text-on-surface placeholder:text-outline/40" id="full_name" name="full_name" placeholder="Alexander Thorne" type="text"/>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2" for="email">
<span class="material-symbols-outlined text-[18px]">mail</span>
                        Email Address
                    </label>
<input class="form-input w-full px-0 py-3 font-body-md text-on-surface placeholder:text-outline/40" id="email" name="email" placeholder="alex@artisancrafted.com" type="email"/>
</div>
<!-- Password Fields Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-[18px]">lock</span>
                            Password
                        </label>
<input class="form-input w-full px-0 py-3 font-body-md text-on-surface placeholder:text-outline/40" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2" for="confirm_password">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
                            Confirm
                        </label>
<input class="form-input w-full px-0 py-3 font-body-md text-on-surface placeholder:text-outline/40" id="confirm_password" name="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms & Privacy -->
<div class="flex items-center gap-3 pt-2">
<input class="rounded border-outline-variant bg-surface-container-low text-primary focus:ring-primary/40" id="terms" type="checkbox"/>
<label class="font-body-md text-sm text-on-surface-variant" for="terms">
                        I agree to the <a class="text-primary hover:underline transition-all" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>
</label>
</div>
<!-- Register Button -->
<div class="pt-stack-md">
<button class="primary-glow-button w-full py-4 bg-primary-container text-on-primary-container font-label-md text-label-md rounded-lg flex items-center justify-center gap-2 group transition-all" type="submit">
                        Register
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<!-- Social Sign Up / Divider -->
<div class="relative my-stack-md text-center">
<span class="absolute inset-x-0 top-1/2 h-px bg-outline-variant/20"></span>
<span class="relative px-4 bg-[#231a2e] font-label-md text-[10px] uppercase tracking-widest text-outline/60">Or Sign Up With</span>
</div>
<div class="grid grid-cols-2 gap-stack-sm">
<button class="flex items-center justify-center gap-2 py-3 rounded-lg border border-outline-variant/30 text-on-surface-variant hover:bg-surface-variant/20 transition-all font-label-md text-label-md">
<span class="material-symbols-outlined">google</span> Google
                </button>
<button class="flex items-center justify-center gap-2 py-3 rounded-lg border border-outline-variant/30 text-on-surface-variant hover:bg-surface-variant/20 transition-all font-label-md text-label-md">
<span class="material-symbols-outlined">file_download</span> Apple
                </button>
</div>
</div>
<!-- Footer Link -->
<footer class="mt-stack-md text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:text-primary-fixed-dim transition-colors ml-1" href="#">Sign In</a>
</p>
</footer>
</main>
<!-- Interactive Script for micro-interactions -->
<script>
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', () => {
                const label = input.previousElementSibling;
                if (label) {
                    label.classList.add('text-primary');
                    label.classList.remove('text-on-surface-variant');
                }
            });
            input.addEventListener('blur', () => {
                const label = input.previousElementSibling;
                if (label) {
                    label.classList.remove('text-primary');
                    label.classList.add('text-on-surface-variant');
                }
            });
        });

        // Floating animation for auras
        const auras = document.querySelectorAll('.aura-glow');
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            auras.forEach((aura, index) => {
                const speed = (index + 1) * 20;
                const offsetX = (x - 0.5) * speed;
                const offsetY = (y - 0.5) * speed;
                aura.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            });
        });
    </script>
</body></html>
