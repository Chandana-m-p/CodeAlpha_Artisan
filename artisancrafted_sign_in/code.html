<style>
        body {
            background-color: #1A1025;
            color: #eedcfa;
            overflow-x: hidden;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }

        .liquid-glass::before {
            content: "";
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .aura-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(232, 177, 248, 0.1) 0%, rgba(26, 16, 37, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(40px);
        }

        .primary-glow-hover:hover {
            box-shadow: 0 0 30px rgba(232, 177, 248, 0.4);
            transform: translateY(-1px);
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #e8b1f8 !important;
            box-shadow: 0 4px 12px -4px rgba(232, 177, 248, 0.2);
        }

        .champagne-link {
            color: #f9d8ff;
            transition: opacity 0.2s ease;
        }
        .champagne-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center relative px-margin-mobile md:px-0">
<!-- Atmospheric Background Components -->

<div class="aura-glow top-[-10%] left-[-10%]"></div>
<div class="aura-glow bottom-[-10%] right-[-10%]"></div>
<!-- Main Container -->
<main class="w-full max-w-[480px] z-10">
<!-- Brand Logo Header (Shared Identity) -->
<div class="flex flex-col items-center mb-stack-lg">
<span class="font-headline-lg text-primary text-2xl font-bold tracking-widest mb-stack-sm">VM</span>
<span class="font-label-md text-label-md tracking-[0.2em] text-on-surface-variant uppercase">ArtisanCrafted</span>
</div>
<!-- Central Liquid Glass Card -->
<section class="liquid-glass rounded-xl p-8 md:p-12 shadow-2xl">
<!-- Header Section -->
<header class="text-center mb-10">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Access your saved collections and orders</p>
</header>
<!-- Login Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 bottom-3 text-outline-variant">mail</span>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant/40 py-3 pl-8 text-on-surface font-body-md focus:border-primary transition-colors placeholder:text-outline-variant/50" id="email" name="email" placeholder="curator@artisancrafted.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="password">Security Key</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 bottom-3 text-outline-variant">lock</span>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant/40 py-3 pl-8 text-on-surface font-body-md focus:border-primary transition-colors" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- Extras: Remember & Forgot -->
<div class="flex items-center justify-between pt-2">
<label class="flex items-center space-x-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer appearance-none h-4 w-4 border border-outline-variant/60 rounded bg-transparent checked:bg-primary checked:border-primary transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute text-[12px] text-on-primary opacity-0 peer-checked:opacity-100 transition-opacity left-0.5" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember Me</span>
</label>
<a class="font-label-md text-label-md champagne-link" href="#">Forgot Password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-label-md text-label-md uppercase tracking-widest primary-glow-hover transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Social/Alternative Login (Implicit Luxury Pattern) -->
<div class="mt-10 pt-8 border-t border-outline-variant/20">
<p class="text-center font-label-md text-label-md text-on-surface-variant mb-6 uppercase tracking-tight">Or continue with</p>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg border border-outline-variant/30 hover:bg-surface-variant/20 transition-all font-label-md text-label-md">
<img alt="Google" class="w-4 h-4 grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlomwvE15T5mUTovjMd79fgE0i6ZUXG9Bs61pE-fGWFwL9F0dSyDueFpVxOGbgJJ9QnKkLDd3pUUjldDk_5H0UdlCLLdXwtHXuEIEwPZHDfo3x4OhrWy7TdgzaJM-NmkmLecVo7diwq04FuwmJRN4BJNyXINAXDI_WpNTj1UKb0rjoWSWE5Qm_ewyVdQ4aLRlPPokBCGYzr_FYWI4yk5_Qk3DRnszBhlu4oU4y5lbCYGy0oWf88FiCeA"/>
<span>Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg border border-outline-variant/30 hover:bg-surface-variant/20 transition-all font-label-md text-label-md">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">file_download</span>
<span>Apple</span>
</button>
</div>
</div>
</section>
<!-- Footer Link -->
<footer class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                New to ArtisanCrafted? 
                <a class="text-primary font-semibold hover:underline ml-1" href="#">Create an Account</a>
</p>
</footer>
</main>
<!-- Decorative Bottom Gradient -->
<div class="fixed bottom-0 left-0 w-full h-1/4 bg-gradient-to-t from-surface-container-lowest/80 to-transparent pointer-events-none"></div>
<script>
        // Micro-interaction for input fields
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#e8b1f8';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = 'rgba(152, 141, 152, 0.6)';
            });
        });

        // Form submission animation simulation
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                // Interaction simulation complete
            }, 1500);
        });
    </script>
</body></html>
